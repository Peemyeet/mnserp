# MySQL + dump หลัก — โหลด database/mns_pm_2021.sql (ข้อมูล/โครงครบจาก PHP; API ชี้ mysql:// ไปที่นี่หรือ cPanel)
#
#   docker compose up -d
#
# ถ้าเคยรันแล้วและอยากโหลด dump ใหม่: docker compose down -v  แล้ว up อีกครั้ง (ลบ volume)
#
# จากนั้นตั้ง server/.env ให้ user/password ตรงด้านล่าง แล้ว npm run api หรือ npm run dev:all

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mns_dev_root
      MYSQL_DATABASE: mns_pm_2021
    ports:
      - "3306:3306"
    volumes:
      - mns_mysql_data:/var/lib/mysql
      - ./database/docker-entrypoint/00-use-database.sql:/docker-entrypoint-initdb.d/00-use-database.sql:ro
      - ./database/mns_pm_2021.sql:/docker-entrypoint-initdb.d/01-mns_pm_2021.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

volumes:
  mns_mysql_data:
